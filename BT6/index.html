<!doctype html>
<html>
	<head>
		<title>Persona 5: Dancing St★r Night</title>
		<meta charset="utf-8"/>
		<link rel="icon" type="image/png" href="img/icon.ico"/>
		<link rel="stylesheet" type="text/css" href="css/style.css">

	</head>
	<body>
		<audio id="hoveraudio" src="music/hover.mp3" type="audio/mpeg"></audio>
		<audio id="clickaudio" src="music/click.mp3" type="audio/mpeg"></audio>

		<script>
			function playSound(hoveraudio) {
				var audio1=document.getElementById(hoveraudio);
				audio1.play();
			}

			function stopSound(hoveraudio) {
				var audio1=document.getElementById(hoveraudio);
				audio1.pause();
				audio1.currentTime = 0;
			}

			function play(clickaudio) {
				var audio2=document.getElementById(clickaudio);
				audio2.play();
			}
		</script>

		<div id="body">
			<div id="header">
				<div id="logo">
					<audio id="audio" autoplay src="music/background.mp3" type="audio/mp3"/>
					</audio>
					<img onmouseenter="playSound('hoveraudio')" onmouseout="stopSound('hoveraudio')" onclick="play('clickaudio')" src="img/logo2.png" id="playpause"/>
					<script>
						document.getElementById("playpause").onclick = function() {
					    var audio = document.getElementById("audio");
					    if (audio.paused) audio.play();
					    else audio.pause();
					};
					</script>
				</div>
				<div id="menu">
					<a href="index.html" onmouseenter="playSound('hoveraudio')" onmouseout="stopSound('hoveraudio')" onclick="play('clickaudio')">Home</a>
					<a href="about.html" onmouseenter="playSound('hoveraudio')" onmouseout="stopSound('hoveraudio')" onclick="play('clickaudio')">About</a>
					<a id="playpause2" onmouseenter="playSound('hoveraudio')" onmouseout="stopSound('hoveraudio')" onclick="play('clickaudio')">♫</a>
					<script>
						document.getElementById("playpause2").onclick = function() {
					    var audio = document.getElementById("audio");
					    if (audio.paused) audio.play();
					    else audio.pause();
					};
					</script>
				</div>
			</div>

				</div>
