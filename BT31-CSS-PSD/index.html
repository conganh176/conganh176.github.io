<!DOCTYPE html>
<html>
<head>
    <title>TVshowCritic</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/icon.ico"/>
    <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
          integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css?family=Roboto:100,100i,300,300i,400,400i,500,500i,700,700i,900,900i"
          rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
<header>
    <div class="container-fluid p-0">
        <nav class="navbar navbar-expand-md navbar-dark bg-dark p-0">
            <a class="navbar-brand mr-5" href="#"><h2 class="m-0">TVshowCritic</h2></a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent"
                    aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse align-items-center" id="navbarSupportedContent">
                <div class="row m-0">
                    <div class="col-md-6 col-lg-7 col-xl-8 p-0 d-flex align-items-center">
                        <ul class="navbar-nav mr-auto">
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle p-0" href="#" id="navbarDropdown" role="button"
                                   data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                    Shows
                                </a>
                                <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                                    <a class="dropdown-item m-0" href="#">Show</a>
                                    <a class="dropdown-item m-0" href="#">Another show</a>
                                    <a class="dropdown-item m-0" href="#">Another show 2</a>
                                </div>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link p-0" href="#">Calendar</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link p-0" href="#">News</a>
                            </li>
                        </ul>
                    </div>

                    <div class="col-md-6 col-lg-5 col-xl-4 p-0">
                        <div class="input-group input-group-lg">
                            <div class="input-group-prepend">
                                <button class="btn btn-link account-button" type="button">
                                    <div><i class="fas fa-user"></i></div>
                                    <div class="text-center"><p class="m-0">Account</p></div>
                                </button>
                            </div>
                            <input type="text" class="form-control" placeholder="Start typing..."
                                   aria-label="Example text with button addon" aria-describedby="button-addon1">
                            <button class="btn btn-link searching-button" type="button"><i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>

                </div>

            </div>
        </nav>
    </div>
</header>

<section>
    <div class="container-fluid top">
        <div class="score">
            <h1>7</h1><h2>/10</h2>
        </div>
    </div>

    <div class="container-fluid middle">

    </div>

    <div class="container-fluid bottom">
        <div class="container">

        </div>
    </div>
</section>

<footer>
    <div class="container">

    </div>

    <div class="container-fluid">

    </div>
</footer>
<script src="js/jquery-3.3.1.min.js"></script>
<script src="js/bootstrap.min.js"></script>
<script src="js/popper.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
