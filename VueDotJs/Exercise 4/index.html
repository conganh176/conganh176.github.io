<!doctype html>
<html>
    <head>
        <title></title>
        <meta charset="utf-8"/>
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <link rel="stylesheet" href="">
        <link rel="icon" type="image/png" href="img/icon.ico"/>
        <link rel="stylesheet" type="text/css" href="css/style.css">
        <style>
            #effect {
              width: 100px;
              height: 100px;
              border: 1px solid black;
            }

            .highlight {
              background-color: red;
              width: 200px !important;
            }

            .shrink {
              background-color: gray;
              width: 50px !important;
            }
            .size {
              font-size: 2em;
            }
            .bold {
              font-weight: bold;
            }
            .greencolor {
              color: green;
            }
            .pinkbackground{
              background-color: pink;
            }
            .display {
              width: 100px;
              height: 100px;
              border: 1px solid black;
            }
            .progressbar {
              width: 100%;
              height: 20px;
              border: 1px solid black;
            }
        </style>
    </head>
    <body>
      <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
      <div id="exercise">
        <!-- 1) Start the Effect with the Button. The Effect should alternate the "highlight" or "shrink" class on each new setInterval tick (attach respective class to the div with id "effect" below) -->
        <div>
          <button @click="startEffect">Start Effect</button>
          <div id="effect" :class="effects"></div>
        </div>
        <!-- 2) Create a couple of CSS classes and attach them via the array syntax -->
        <div :class="['size', 'bold', 'greencolor', 'pinkbackground']">I got no class :(</div>
        <!-- 3) Let the user enter a class (create some example classes) and attach it -->
        <div>
          <input type="text" v-model="ClassEntered" placeholder="Class">
          <div :class="[{display: true}, ClassEntered]"></div>
        </div>
        <!-- 4) Let the user enter a class and enter true/ false for another class (create some example classes) and attach the classes -->
        <div>
          <input type="text" v-model="ClassEntered2" placeholder="Class">
          <input type="text" v-model="boolean" placeholder="boolean">
          <div :class="[{display: boolean}, ClassEntered2]"></div>
        </div>
        <!-- 5) Repeat 3) but now with values for styles (instead of class names). Attach the respective styles.  -->
        <div>
          <input type="text" v-model="Style.backgroundColor">
          <div :style="Style"></div>
        </div>
        <!-- 6) Create a simple progress bar with setInterval and style bindings. Start it by hitting the below button. -->
        <div>
          <button @click="startProgress">Start Progress</button>
          <div :class="['progressbar']" :style="progressed"></div>
        </div>
      </div>
      <script>
        new Vue({
          el: '#exercise',
          data: {
            effects: {
              highlight: false,
              shrink: true
            },
            ClassEntered: '',
            ClassEntered2: '',
            boolean: true,
            Style: {
              width: '100px',
              height: '100px',
              border: '1px solid black',
              backgroundColor: 'yellow'
            },
            progressed: {
              width: '0px',
              backgroundColor: 'green'
            }
          },
          methods: {
            startEffect: function() {
              var vm = this;
              setInterval (function() {
                vm.effects.highlight = !vm.effects.highlight;
                vm.effects.shrink = !vm.effects.shrink;
              }, 2000);
            },
            startProgress: function() {
              var vm=this;
              var width=0;
              var myprogress = setInterval(function() {
                width += 10;
                vm.progressed.width = width + '%';
                // console.log(width);
                if (width === 100) {

                  clearInterval(myprogress);
                }
              }, 1000);


            }
          }
        });
      </script>
    </body>
</html>
