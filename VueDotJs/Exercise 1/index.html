<!doctype html>
<html>
    <head>
        <title></title>
        <meta charset="utf-8"/>
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <link rel="stylesheet" href="">
        <link rel="icon" type="image/png" href="img/icon.ico"/>
        <link rel="stylesheet" type="text/css" href="css/style.css">
    </head>
    <body>
        <div id="exercise">
           <!-- 1) Fill the <p> below with your Name and Age - using Interpolation -->
            <p>VueJS is pretty cool - {{ name }} ({{ age }})</p>
            <!-- 2) Output your age, multiplied by 3 -->
            <p>{{ age*3 }}</p>
            <!-- 3) Call a function to output a random float between 0 and 1 (Math.random()) -->
            <p>{{ random() }}</p>
            <!-- 4) Search any image on Google and output it here by binding the "src" attribute -->
            <div>
                <img v-bind:src="image" style="width:100px;height:100px">
            </div>
            <!-- 5) Pre-Populate this input with your name (set the "value" attribute) -->
            <div>
                <input v-bind:value="name" type="text">
            </div>
        </div>
        <script src="https://unpkg.com/vue/dist/vue.js"></script>
        <script>
            new Vue({
                el: '#exercise',
              data: {
                name: 'Cong Anh Nguyen',
                age: new Date().getFullYear()-1996,
                image: 'https://pbs.twimg.com/profile_images/972154872261853184/RnOg6UyU_400x400.jpg'
              },
              methods: {
                random: function() {
                  return Math.random();
                }
              }
            })
        </script>
    </body>
</html>
